<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>매물 수정</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="wrap">

    <div class="topbar">
        <h1>매물 수정</h1>
        <div class="inline">
            <a class="btn" th:href="@{|/properties/${propertyId}|}">← 상세</a>
            <a class="btn" href="/properties">목록</a>
            <a class="btn" href="/">🗺️ 지도</a>
        </div>
    </div>

    <div th:if="${error}" class="alert" th:text="${error}">에러</div>

    <form th:action="@{|/properties/${propertyId}|}" method="post" enctype="multipart/form-data">

        <div class="card">
            <h2>사진</h2>

            <div class="photos-box" th:if="${property != null and property.photos != null and !#lists.isEmpty(property.photos)}">
                <div class="photo-card" th:each="ph : ${property.photos}">
                    <img th:src="${ph.url}" alt="photo">
                    <div style="margin-top:8px;">
                        <button class="btn danger" type="submit"
                                th:formaction="@{|/properties/${propertyId}/photos/${ph.id}/delete|}"
                                formmethod="post"
                                onclick="return confirm('이 사진을 삭제할까요?');">사진 삭제</button>
                    </div>
                </div>
            </div>

            <div class="photo-help" th:if="${property == null or property.photos == null or #lists.isEmpty(property.photos)}">
                등록된 사진이 없습니다.
            </div>

            <div style="margin-top:10px;">
                <div class="field">
                    <label>사진 추가</label>
                    <input type="file" name="photos" multiple accept="image/*"/>
                    <div class="help">여러 장 업로드 가능</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>기본 정보</h2>
            <div class="grid">
                <div class="field">
                    <label>제목 *</label>
                    <input name="title" required th:value="${form != null ? form.title : ''}"/>
                </div>
                <div class="field">
                    <label>구역</label>
                    <input name="region" th:value="${form != null ? form.region : ''}"/>
                </div>
                <div class="field">
                    <label>건물명</label>
                    <input name="buildingName" th:value="${form != null ? form.buildingName : ''}"/>
                </div>
                <div class="field">
                    <label>호수</label>
                    <input name="unitNumber" th:value="${form != null ? form.unitNumber : ''}"/>
                </div>
                <div class="field">
                    <label>지번 주소</label>
                    <input name="lotAddress" th:value="${form != null ? form.lotAddress : ''}"/>
                </div>
                <div class="field">
                    <label>준공연도</label>
                    <input type="number" name="builtYear" th:value="${form != null ? form.builtYear : ''}"/>
                </div>
                <div class="field">
                    <label>평수</label>
                    <input type="number" step="0.1" name="area" th:value="${form != null ? form.area : ''}"/>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>거래 정보</h2>
            <div class="grid">
                <div class="field">
                    <label>거래 유형</label>
                    <select name="dealType">
                        <option value="MONTHLY"
                                th:selected="${form == null || form.dealType == null || form.dealType.name() == 'MONTHLY'}">월세</option>
                        <option value="JEONSE"
                                th:selected="${form != null && form.dealType != null && form.dealType.name() == 'JEONSE'}">전세</option>
                    </select>
                </div>

                <div class="field">
                    <label>상태</label>
                    <select name="status">
                        <option value="VACANT"
                                th:selected="${form == null || form.status == null || form.status.name() == 'VACANT'}">공실</option>
                        <option value="CONTRACTED"
                                th:selected="${form != null && form.status != null && form.status.name() == 'CONTRACTED'}">세입자 있음(계약중)</option>
                    </select>
                </div>

                <div class="field">
                    <label>만기</label>
                    <input type="text" name="expiry"
                           placeholder="예: 4/27"
                           th:value="${form != null ? form.expiry : ''}" />
                </div>

                <div class="field">
                    <label>보증금 (만원)</label>
                    <input type="number" name="deposit" th:value="${form != null ? form.deposit : ''}"/>
                </div>
                <div class="field">
                    <label>월세 (만원)</label>
                    <input type="number" name="monthlyRent" th:value="${form != null ? form.monthlyRent : ''}"/>
                </div>
                <div class="field">
                    <label>관리비 (만원)</label>
                    <input type="number" name="managementFee" th:value="${form != null ? form.managementFee : ''}"/>
                </div>
            </div>
            <div class="help" style="margin-top:8px;">※ 금액은 “만원 단위”로 입력</div>
        </div>

        <div class="card">
            <h2>옵션</h2>
            <div class="grid">
                <div class="field">
                    <label>룸 개수</label>
                    <select name="roomCount">
                        <option value="" th:selected="${form == null || form.roomCount == null}">선택안함</option>
                        <option value="1" th:selected="${form != null && form.roomCount != null && form.roomCount == 1}">1</option>
                        <option value="2" th:selected="${form != null && form.roomCount != null && form.roomCount == 2}">2</option>
                        <option value="3" th:selected="${form != null && form.roomCount != null && form.roomCount == 3}">3</option>
                        <option value="4" th:selected="${form != null && form.roomCount != null && form.roomCount == 4}">4</option>
                    </select>
                </div>

                <div class="field">
                    <label>엘리베이터</label>
                    <select name="hasElevator">
                        <option value="" th:selected="${form == null || form.hasElevator == null}">선택안함</option>
                        <option value="true" th:selected="${form != null && form.hasElevator == true}">있음</option>
                        <option value="false" th:selected="${form != null && form.hasElevator == false}">없음</option>
                    </select>
                </div>

                <div class="field">
                    <label>주차</label>
                    <select name="hasParking">
                        <option value="" th:selected="${form == null || form.hasParking == null}">선택안함</option>
                        <option value="true" th:selected="${form != null && form.hasParking == true}">가능</option>
                        <option value="false" th:selected="${form != null && form.hasParking == false}">불가</option>
                    </select>
                </div>

                <div class="field">
                    <label>반려동물</label>
                    <select name="petAllowed">
                        <option value="" th:selected="${form == null || form.petAllowed == null}">선택안함</option>
                        <option value="true" th:selected="${form != null && form.petAllowed == true}">가능</option>
                        <option value="false" th:selected="${form != null && form.petAllowed == false}">불가</option>
                    </select>
                </div>

                <div class="field">
                    <label>LH 여부</label>
                    <select name="lhAvailable">
                        <option value="" th:selected="${form == null || form.lhAvailable == null}">선택안함</option>
                        <option value="true" th:selected="${form != null && form.lhAvailable == true}">LH</option>
                        <option value="false" th:selected="${form != null && form.lhAvailable == false}">일반</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>연락 / 비밀번호</h2>
            <div class="grid">
                <div class="field">
                    <label>세입자 연락처</label>
                    <input name="tenantPhone" th:value="${form != null ? form.tenantPhone : ''}"/>
                </div>
                <div class="field">
                    <label>건물주 연락처</label>
                    <input name="ownerPhone" th:value="${form != null ? form.ownerPhone : ''}"/>
                </div>
                <div class="field">
                    <label>공동현관 비번</label>
                    <input name="entrancePassword" th:value="${form != null ? form.entrancePassword : ''}"/>
                </div>
                <div class="field">
                    <label>집 비번</label>
                    <input name="housePassword" th:value="${form != null ? form.housePassword : ''}"/>
                </div>
            </div>
        </div>

        <div class="actions">
            <a class="btn" th:href="@{|/properties/${propertyId}|}">취소</a>
            <button class="btn primary" type="submit">수정 저장</button>
        </div>
    </form>

</div>
</body>
</html>
