<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>매물 수정</title>
    <style>
        :root{--border:#e5e7eb;--text:#111827;--muted:#6b7280;--bg:#fff;--panel:#f9fafb;--primary:#111827;--danger:#ef4444;}
        *{box-sizing:border-box}
        body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--text);background:var(--bg)}
        .wrap{max-width:1100px;margin:0 auto;padding:18px 16px 28px}
        .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
        h1{margin:0;font-size:20px;letter-spacing:-.2px}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);text-decoration:none;font-size:13px;cursor:pointer}
        .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
        .btn.danger{border-color:#fecaca;color:var(--danger)}
        .alert{padding:10px 12px;border:1px solid #fecaca;background:#fff1f2;color:#991b1b;border-radius:12px;margin-bottom:12px;font-size:13px}
        .card{border:1px solid var(--border);background:var(--panel);border-radius:14px;padding:14px;margin-bottom:12px}
        .card h2{margin:0 0 10px 0;font-size:14px;color:#374151}
        .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
        @media(max-width:720px){.grid{grid-template-columns:1fr}}
        .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
        input,select{
            width:100%;padding:10px 10px;border-radius:10px;border:1px solid var(--border);
            background:#fff;font-size:13px;outline:none
        }
        input:focus,select:focus{border-color:#c7cdd6;box-shadow:0 0 0 3px rgba(17,24,39,.06)}
        .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
        .photos{display:flex;gap:10px;flex-wrap:wrap}
        .photo{background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center;width:190px}
        .photo img{width:170px;height:120px;object-fit:cover;border-radius:10px;border:1px solid var(--border)}
        .help{margin-top:6px;font-size:12px;color:var(--muted)}
    </style>
</head>
<body>
<div class="wrap">

    <div class="topbar">
        <h1>매물 수정</h1>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <a class="btn" th:href="@{|/properties/${propertyId}|}">← 상세</a>
            <a class="btn" href="/properties">목록</a>
            <a class="btn" href="/">🗺️ 지도</a>
        </div>
    </div>

    <div th:if="${error}" class="alert" th:text="${error}">에러</div>

    <form th:action="@{|/properties/${propertyId}|}" method="post" enctype="multipart/form-data">

        <div class="card">
            <h2>사진</h2>

            <div class="photos" th:if="${property != null and property.photos != null and !#lists.isEmpty(property.photos)}">
                <div class="photo" th:each="ph : ${property.photos}">
                    <img th:src="${ph.url}" alt="photo">
                    <!-- ✅ 중첩 form 금지: formaction -->
                    <div style="margin-top:8px;">
                        <button class="btn danger" type="submit"
                                th:formaction="@{|/properties/${propertyId}/photos/${ph.id}/delete|}"
                                formmethod="post"
                                onclick="return confirm('이 사진을 삭제할까요?');">사진 삭제</button>
                    </div>
                </div>
            </div>

            <div class="help" th:if="${property == null or property.photos == null or #lists.isEmpty(property.photos)}">
                등록된 사진이 없습니다.
            </div>

            <div style="margin-top:10px;">
                <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px;">사진 추가</label>
                <input type="file" name="photos" multiple accept="image/*"/>
                <div class="help">여러 장 업로드 가능</div>
            </div>
        </div>

        <div class="card">
            <h2>기본 정보</h2>
            <div class="grid">
                <div class="field"><label>제목 *</label><input name="title" th:value="${form.title}" required/></div>
                <div class="field"><label>구역</label><input name="region" th:value="${form.region}"/></div>
                <div class="field"><label>건물명</label><input name="buildingName" th:value="${form.buildingName}"/></div>
                <div class="field"><label>호수</label><input name="unitNumber" th:value="${form.unitNumber}"/></div>
                <div class="field"><label>도로명 주소 *</label><input name="address" th:value="${form.address}" required/></div>
                <div class="field"><label>지번 주소</label><input name="lotAddress" th:value="${form.lotAddress}"/></div>
                <div class="field"><label>준공연도</label><input type="number" name="builtYear" th:value="${form.builtYear}"/></div>
                <div class="field"><label>평수</label><input type="number" step="0.1" name="area" th:value="${form.area}"/></div>
            </div>
        </div>

        <div class="card">
            <h2>거래 정보</h2>
            <div class="grid">
                <div class="field">
                    <label>거래 유형</label>
                    <select name="dealType">
                        <option value="MONTHLY" th:selected="${form.dealType != null and form.dealType.name() == 'MONTHLY'}">월세</option>
                        <option value="JEONSE"  th:selected="${form.dealType != null and form.dealType.name() == 'JEONSE'}">전세</option>
                    </select>
                </div>

                <div class="field">
                    <label>상태</label>
                    <select name="status">
                        <option value="VACANT" th:selected="${form.status != null and form.status.name() == 'VACANT'}">공실</option>
                        <option value="CONTRACTED" th:selected="${form.status != null and form.status.name() == 'CONTRACTED'}">세입자 있음(계약중)</option>
                    </select>
                </div>

                <div class="field"><label>보증금 (만원)</label><input type="number" name="deposit" th:value="${form.deposit}"/></div>
                <div class="field"><label>월세 (만원)</label><input type="number" name="monthlyRent" th:value="${form.monthlyRent}"/></div>
                <div class="field"><label>관리비 (만원)</label><input type="number" name="managementFee" th:value="${form.managementFee}"/></div>
            </div>
            <div class="help" style="margin-top:8px;">※ 금액은 “만원 단위”로 입력</div>
        </div>

        <div class="card">
            <h2>옵션</h2>
            <div class="grid">
                <div class="field">
                    <label>룸 개수</label>
                    <select name="roomCount">
                        <option value="" th:selected="${form.roomCount == null}">선택안함</option>
                        <option value="1" th:selected="${form.roomCount == 1}">1</option>
                        <option value="2" th:selected="${form.roomCount == 2}">2</option>
                        <option value="3" th:selected="${form.roomCount == 3}">3</option>
                        <option value="4" th:selected="${form.roomCount == 4}">4</option>
                    </select>
                </div>

                <div class="field"><label>엘리베이터</label>
                    <select name="hasElevator">
                        <option value="" th:selected="${form.hasElevator == null}">선택안함</option>
                        <option value="true" th:selected="${form.hasElevator == true}">있음</option>
                        <option value="false" th:selected="${form.hasElevator == false}">없음</option>
                    </select>
                </div>

                <div class="field"><label>주차</label>
                    <select name="hasParking">
                        <option value="" th:selected="${form.hasParking == null}">선택안함</option>
                        <option value="true" th:selected="${form.hasParking == true}">가능</option>
                        <option value="false" th:selected="${form.hasParking == false}">불가</option>
                    </select>
                </div>

                <div class="field"><label>반려동물</label>
                    <select name="petAllowed">
                        <option value="" th:selected="${form.petAllowed == null}">선택안함</option>
                        <option value="true" th:selected="${form.petAllowed == true}">가능</option>
                        <option value="false" th:selected="${form.petAllowed == false}">불가</option>
                    </select>
                </div>

                <div class="field"><label>LH 여부</label>
                    <select name="lhAvailable">
                        <option value="" th:selected="${form.lhAvailable == null}">선택안함</option>
                        <option value="true" th:selected="${form.lhAvailable == true}">LH</option>
                        <option value="false" th:selected="${form.lhAvailable == false}">일반</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>연락 / 비밀번호</h2>
            <div class="grid">
                <div class="field"><label>세입자 연락처</label><input name="tenantPhone" th:value="${form.tenantPhone}"/></div>
                <div class="field"><label>건물주 연락처</label><input name="ownerPhone" th:value="${form.ownerPhone}"/></div>
                <div class="field"><label>공동현관 비번</label><input name="entrancePassword" th:value="${form.entrancePassword}"/></div>
                <div class="field"><label>집 비번</label><input name="housePassword" th:value="${form.housePassword}"/></div>
            </div>
        </div>

        <div class="actions">
            <a class="btn" th:href="@{|/properties/${propertyId}|}">취소</a>
            <button class="btn primary" type="submit">수정 저장</button>
        </div>
    </form>

</div>
</body>
</html>
