<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>매물 목록</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="wrap wide">

    <div class="topbar" style="align-items:flex-end;">
        <div>
            <h1>매물 목록</h1>
            <div class="muted">등록된 매물들을 빠르게 확인하고 수정/삭제할 수 있어요.</div>
        </div>

        <div class="inline" style="justify-content:flex-end;">
            <a class="btn primary" href="/properties/new">+ 매물 등록</a>
            <a class="btn" href="/">🗺️ 매물 지도</a>
        </div>
    </div>

    <div class="card">
        <h2>검색</h2>
        <div class="inline">
            <div class="field" style="min-width:260px; flex:1;">
                <label>검색(제목/주소)</label>
                <input id="q" type="text" placeholder="예: 해운대, 센텀, 아파트..." />
            </div>
            <button class="btn" type="button" onclick="applyFilter()">검색</button>
            <button class="btn" type="button" onclick="resetFilter()">초기화</button>
        </div>
        <div class="help">※ 현재는 프론트 임시 필터(나중에 서버 검색 붙일 때 교체)</div>
    </div>

    <div class="card" style="background:#fff; overflow:auto;">
        <table style="width:100%; border-collapse:collapse;">
            <thead>
            <tr style="background:#f3f4f6; text-align:left; font-size:12px; color:#374151;">
                <th style="padding:10px 12px; border-bottom:1px solid var(--border); width:70px;">ID</th>
                <th style="padding:10px 12px; border-bottom:1px solid var(--border); width:240px;">제목</th>
                <th style="padding:10px 12px; border-bottom:1px solid var(--border);">주소</th>
                <th style="padding:10px 12px; border-bottom:1px solid var(--border); width:90px;">유형</th>
                <th style="padding:10px 12px; border-bottom:1px solid var(--border); width:140px;">금액(만)</th>
                <th style="padding:10px 12px; border-bottom:1px solid var(--border); width:90px;">상태</th>
                <th style="padding:10px 12px; border-bottom:1px solid var(--border); width:260px; text-align:right;">액션</th>
            </tr>
            </thead>

            <tbody id="tbody">
            <tr th:each="p : ${properties}" class="row" style="border-bottom:1px solid var(--border);">
                <td style="padding:10px 12px; font-variant-numeric:tabular-nums;" th:text="${p.id}">1</td>

                <td style="padding:10px 12px;">
                    <a th:href="@{|/properties/${p.id}|}"
                       th:text="${p.title}"
                       style="color:var(--text); text-decoration:none; font-weight:700; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                        제목
                    </a>
                    <div class="muted" th:text="${p.buildingName} ?: ''" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">건물명</div>
                </td>

                <td style="padding:10px 12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" th:text="${p.address}">주소</td>

                <td style="padding:10px 12px;">
                    <span class="badge" th:text="${p.dealType.label}">월세</span>
                </td>

                <td style="padding:10px 12px; font-variant-numeric:tabular-nums;">
          <span th:if="${p.dealType.name() == 'MONTHLY'}">
            <span th:text="${p.depositMan}">0</span>/<span th:text="${p.monthlyRentMan}">0</span>
          </span>
                    <span th:if="${p.dealType.name() == 'JEONSE'}">
            전세 <span th:text="${p.depositMan}">0</span>
          </span>
                </td>

                <td style="padding:10px 12px;">
          <span class="badge"
                th:classappend="${p.status.name() == 'VACANT'} ? ' green' : ' gray'"
                th:text="${p.status.label}">공실</span>
                </td>

                <td style="padding:10px 12px; text-align:right;">
                    <div class="inline" style="justify-content:flex-end;">
                        <a class="btn" th:href="@{|/properties/${p.id}|}">상세</a>
                        <a class="btn" th:href="@{|/properties/${p.id}/edit|}">수정</a>
                        <form th:action="@{|/properties/${p.id}/delete|}" method="post" style="margin:0;"
                              onsubmit="return confirm('정말 삭제할까요?');">
                            <button class="btn danger" type="submit">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script defer th:src="@{/js/list.js}"></script>
</body>
</html>
