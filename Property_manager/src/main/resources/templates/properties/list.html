<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>매물 목록</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="wrap wide">

    <div class="topbar" style="align-items:flex-end;">
        <div>
            <h1>매물 목록</h1>
            <div class="muted">등록된 매물들을 빠르게 확인하고 수정/삭제할 수 있어요.</div>
        </div>

        <div class="inline" style="justify-content:flex-end;">
            <a class="btn primary" href="/properties/new">+ 매물 등록</a>
            <a class="btn" href="/">🗺️ 매물 지도</a>
        </div>
    </div>

    <!-- ✅ 필터: 지도 UI처럼 -->
    <form class="panel" method="get" th:action="@{/properties}">

        <div class="group">
            <h3>기본 조건</h3>

            <div class="field" style="margin-bottom:12px;">
                <label>🔍 키워드</label>
                <input name="keyword" th:value="${keyword}" placeholder="제목/주소/건물명" />
            </div>

            <div class="grid four">
                <!-- 구역 -->
                <div class="field">
                    <label>구역</label>
                    <input name="region" th:value="${region}" placeholder="예: 해운대" />
                </div>

                <!-- 거래유형 -->
                <div class="field">
                    <label>거래유형</label>
                    <select name="dealType">
                        <option value="" th:selected="${dealType == null}">전체</option>
                        <option value="MONTHLY" th:selected="${dealType != null and dealType.name()=='MONTHLY'}">월세</option>
                        <option value="JEONSE" th:selected="${dealType != null and dealType.name()=='JEONSE'}">전세</option>
                    </select>
                </div>

                <!-- 만기 -->
                <div class="field">
                    <label>만기</label>
                    <input name="expiry" th:value="${expiry}" placeholder="예: 4/27" />
                    <div class="help">예: 4/27, 10/3 등 문자열로 검색</div>
                </div>

                <!-- 상태 -->
                <div class="field">
                    <label>상태</label>
                    <select name="status">
                        <option value="" th:selected="${status == null}">전체</option>
                        <option value="VACANT" th:selected="${status != null and status.name()=='VACANT'}">공실</option>
                        <option value="CONTRACTED" th:selected="${status != null and status.name()=='CONTRACTED'}">계약완료</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="group">
            <h3>가격/스펙</h3>
            <div class="grid four">

                <div class="field">
                    <label>보증금(만)</label>
                    <div class="range">
                        <input name="minDeposit" type="number" th:value="${minDeposit}" placeholder="최소" />
                        <div class="sep">~</div>
                        <input name="maxDeposit" type="number" th:value="${maxDeposit}" placeholder="최대" />
                    </div>
                </div>

                <div class="field">
                    <label>월세(만)</label>
                    <div class="range">
                        <input name="minMonthlyRent" type="number" th:value="${minMonthlyRent}" placeholder="최소" />
                        <div class="sep">~</div>
                        <input name="maxMonthlyRent" type="number" th:value="${maxMonthlyRent}" placeholder="최대" />
                    </div>
                </div>

                <div class="field">
                    <label>준공연도</label>
                    <div class="range">
                        <input name="minBuiltYear" type="number" th:value="${minBuiltYear}" placeholder="최소" />
                        <div class="sep">~</div>
                        <input name="maxBuiltYear" type="number" th:value="${maxBuiltYear}" placeholder="최대" />
                    </div>
                </div>

                <div class="field">
                    <label>평수</label>
                    <div class="range">
                        <input name="minArea" type="number" step="0.1" th:value="${minArea}" placeholder="최소" />
                        <div class="sep">~</div>
                        <input name="maxArea" type="number" step="0.1" th:value="${maxArea}" placeholder="최대" />
                    </div>
                </div>

            </div>
        </div>

        <div class="group">
            <h3>옵션</h3>
            <div class="grid five">

                <div class="field">
                    <label>룸 개수</label>
                    <select name="roomCount">
                        <option value="" th:selected="${roomCount == null}">전체</option>
                        <option value="1" th:selected="${roomCount != null and roomCount == 1}">1</option>
                        <option value="2" th:selected="${roomCount != null and roomCount == 2}">2</option>
                        <option value="3" th:selected="${roomCount != null and roomCount == 3}">3</option>
                        <option value="4" th:selected="${roomCount != null and roomCount == 4}">4</option>
                    </select>
                </div>

                <div class="field">
                    <label>엘리베이터</label>
                    <select name="hasElevator">
                        <option value="" th:selected="${hasElevator == null}">전체</option>
                        <option value="true" th:selected="${hasElevator != null and hasElevator == true}">있음</option>
                        <option value="false" th:selected="${hasElevator != null and hasElevator == false}">없음</option>
                    </select>
                </div>

                <div class="field">
                    <label>주차</label>
                    <select name="hasParking">
                        <option value="" th:selected="${hasParking == null}">전체</option>
                        <option value="true" th:selected="${hasParking != null and hasParking == true}">가능</option>
                        <option value="false" th:selected="${hasParking != null and hasParking == false}">불가</option>
                    </select>
                </div>

                <div class="field">
                    <label>반려동물</label>
                    <select name="petAllowed">
                        <option value="" th:selected="${petAllowed == null}">전체</option>
                        <option value="true" th:selected="${petAllowed != null and petAllowed == true}">가능</option>
                        <option value="false" th:selected="${petAllowed != null and petAllowed == false}">불가</option>
                    </select>
                </div>

                <div class="field">
                    <label>LH</label>
                    <select name="lhAvailable">
                        <option value="" th:selected="${lhAvailable == null}">전체</option>
                        <option value="true" th:selected="${lhAvailable != null and lhAvailable == true}">LH</option>
                        <option value="false" th:selected="${lhAvailable != null and lhAvailable == false}">일반</option>
                    </select>
                </div>

            </div>
        </div>

        <div class="actions">
            <a class="btn" th:href="@{/properties}">초기화</a>
            <button class="btn primary" type="submit">적용</button>
        </div>
    </form>

    <!-- ✅ 결과 테이블 -->
    <div class="table-wrap">
        <table class="table">
            <thead>
            <tr>
                <th style="width:70px;">ID</th>
                <th style="width:240px;">제목</th>
                <th>주소</th>
                <th style="width:90px;">유형</th>
                <th style="width:140px;">금액(만)</th>
                <th style="width:90px;">상태</th>
                <th style="width:90px;">만기</th>
                <th style="width:260px; text-align:right;">액션</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${properties}">
                <td class="mono" th:text="${p.id}">1</td>

                <td>
                    <a th:href="@{|/properties/${p.id}|}"
                       th:text="${p.title}"
                       style="color:var(--text);text-decoration:none;font-weight:700;display:block;"
                       class="ellipsis">제목</a>
                    <div class="muted ellipsis" th:text="${p.buildingName} ?: ''">건물명</div>
                </td>

                <td class="ellipsis" th:text="${p.lotAddress}">주소</td>

                <td>
                    <span class="badge" th:text="${p.dealType.label}">월세</span>
                </td>

                <td class="mono">
          <span th:if="${p.dealType.name() == 'MONTHLY'}">
            <span th:text="${p.depositMan}">0</span>/<span th:text="${p.monthlyRentMan}">0</span>
          </span>
                    <span th:if="${p.dealType.name() == 'JEONSE'}">
            전세 <span th:text="${p.depositMan}">0</span>
          </span>
                </td>

                <td>
          <span class="badge"
                th:classappend="${p.status.name() == 'VACANT'} ? ' green' : ' gray'"
                th:text="${p.status.label}">공실</span>
                </td>

                <td class="mono" th:text="${p.expiry} ?: '-'">-</td>

                <td style="text-align:right;">
                    <div class="inline" style="justify-content:flex-end;">
                        <a class="btn" th:href="@{|/properties/${p.id}|}">상세</a>
                        <a class="btn" th:href="@{|/properties/${p.id}/edit|}">수정</a>
                        <form th:action="@{|/properties/${p.id}/delete|}" method="post" style="margin:0;"
                              onsubmit="return confirm('정말 삭제할까요?');">
                            <button class="btn danger" type="submit">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
