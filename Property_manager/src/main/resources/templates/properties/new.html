<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>매물 등록</title>
    <style>
        section { margin-bottom: 30px; }
        h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        label { display:block; margin-top:10px; }
        input, select { width: 300px; padding:5px; }
    </style>
</head>
<body>

<h1>매물 등록</h1>
<p th:if="${error}" th:text="${error}" style="color:red;"></p>
<form th:action="@{/properties}" method="post" enctype="multipart/form-data">

    <!-- ================= 기본 정보 ================= -->
    <section>
        <h2>기본 정보</h2>

        <label>제목 *</label>
        <input type="text" name="title" required/>

        <label>구역</label>
        <input type="text" name="region"/>

        <label>건물명</label>
        <input type="text" name="buildingName"/>

        <label>도로명 주소 *</label>
        <input type="text" name="address" required/>

        <label>지번 주소</label>
        <input type="text" name="lotAddress"/>

        <label>호수</label>
        <input type="text" name="unitNumber"/>

        <label>준공연도</label>
        <input type="number" name="builtYear"/>

        <label>평수</label>
        <input type="number" step="0.1" name="area"/>
    </section>

    <!-- ================= 거래 정보 ================= -->
    <section>
        <h2>거래 정보</h2>

        <label>거래 유형</label>
        <select name="dealType">
            <option value="MONTHLY" selected>월세</option>
            <option value="JEONSE">전세</option>
        </select>

        <label>보증금 (만원)</label>
        <input type="number" name="deposit"/>

        <label>월세 (만원)</label>
        <input type="number" name="monthlyRent"/>

        <label>관리비 (만원)</label>
        <input type="number" name="managementFee"/>
    </section>

    <!-- ================= 옵션 ================= -->
    <section>
        <h2>옵션</h2>

        <label>엘리베이터</label>
        <select name="hasElevator">
            <option value="">선택안함</option>
            <option value="true">있음</option>
            <option value="false">없음</option>
        </select>

        <label>주차</label>
        <select name="hasParking">
            <option value="">선택안함</option>
            <option value="true">가능</option>
            <option value="false">불가능</option>
        </select>

        <label>룸 개수 (최대 4)</label>
        <input type="number" name="roomCount" min="0" max="4"/>

        <label>반려동물</label>
        <select name="petAllowed">
            <option value="">선택안함</option>
            <option value="true">가능</option>
            <option value="false">불가능</option>
        </select>

        <label>LH 가능 여부</label>
        <select name="lhAvailable">
            <option value="">선택안함</option>
            <option value="true">가능</option>
            <option value="false">불가능</option>
        </select>
    </section>

    <!-- ================= 보안 / 연락 ================= -->
    <section>
        <h2>보안 / 연락 정보</h2>

        <label>공동현관 비밀번호</label>
        <input name="entrancePassword"/>

        <label>집 비밀번호</label>
        <input name="housePassword"/>

        <label>세입자 연락처</label>
        <input type="text" name="tenantPhone"/>

        <label>건물주 연락처</label>
        <input type="text" name="ownerPhone"/>
    </section>

    <div>
        <label>사진</label><br/>
        <input type="file" name="photos" multiple accept="image/*"/>
    </div>

    <div style="margin-top:20px;">
        <button type="submit">저장</button>
        <a href="/properties">취소</a>
    </div>

</form>

</body>
</html>
