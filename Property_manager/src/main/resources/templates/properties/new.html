<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>매물 등록</title>
</head>
<body>
<h1>매물 등록</h1>
<p style="color:gray;">
    ※ 도로명 주소, 지번 주소 중 하나를 정확히 입력해주세요.
    예: 부산광역시 해운대구 센텀동로 45
</p>



<form action="/properties" method="post">
    <div>
        <label>제목</label><br/>
        <input name="title" required/>
    </div>

    <div>
        <label>주소</label><br/>
        <input name="address" id="addressInput" required/>
        <div id="addressMessage" style="margin-top:5px;"></div>
    </div>

    <div>
        <label>가격</label></br>
        <input name="price" type="number" required/>
    </div>

    <div>
        <label>유형</label></br>
        <select name="type" required>
            <option th:each="t : ${types}" th:value="${t}" th:text="${t}">ONE_ROOM</option>
        </select>
    </div>

    <div style="margin-top : 12px;">
        <button type="submit" id="saveBtn" disabled>저장</button>
        <a href="/properties">취소</a>
    </div>

</form>



</body>

<script>
    const addressInput = document.getElementById("addressInput");
    const messageDiv = document.getElementById("addressMessage");
    const saveBtn = document.getElementById("saveBtn");

    addressInput.addEventListener("blur", function () {

        const address = addressInput.value.trim();

        if (!address) return;

        fetch(`/api/validate-address?address=${encodeURIComponent(address)}`)
            .then(res => res.json())
            .then(data => {

                if (data.valid) {
                    messageDiv.style.color = "green";
                    messageDiv.textContent = "✅ " + data.message;
                    saveBtn.disabled = false;
                } else {
                    messageDiv.style.color = "red";
                    messageDiv.textContent = "❌ " + data.message;
                    saveBtn.disabled = true;
                }
            });
    });
</script>
</html>
