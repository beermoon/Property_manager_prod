<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Property Manager</title>
    <style>
        #map { width: 100%; height: 600px; }
    </style>
</head>
<body>
<h1>매물 지도</h1>

<div id="map"></div>

<!-- ✅ 네이버 지도 JS 로드: ncpClientId 필요 -->
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=m09cd547kq"></script>
<script>
    // ✅ 지도 생성 (문서 예제와 동일한 방식)
    const map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(37.5665, 126.9780), // 서울시청 근처
        zoom: 12
    });

    fetch('/api/properties')
        .then(res => res.json())
        .then(list => {
            list.forEach(p => {
                const marker = new naver.maps.Marker({
                    position: new naver.maps.LatLng(p.lat, p.lng),
                    map: map
                });

                const info = new naver.maps.InfoWindow({
                    content: `
            <div style="padding:8px;">
              <b>${p.title}</b><br/>
              <a href="/properties/${p.id}">상세보기</a>
            </div>
          `
                });

                naver.maps.Event.addListener(marker, 'click', () => {
                    info.open(map, marker);
                });
            });
        });

</script>
</body>
</html>
