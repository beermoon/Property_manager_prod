<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>매물 지도</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root{
            --border:#e5e7eb;
            --text:#111827;
            --muted:#6b7280;
            --bg:#ffffff;
            --panel:#f9fafb;
            --btn:#111827;
            --btnText:#ffffff;
            --btnGhost:#ffffff;
        }

        *{ box-sizing:border-box; }
        body{
            margin:0;
            font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color:var(--text);
            background:var(--bg);
        }

        .wrap{
            max-width: 1200px;
            margin: 0 auto;
            padding: 18px 16px 22px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:12px;
        }
        .topbar h1{
            margin:0;
            font-size:20px;
            letter-spacing:-0.2px;
        }
        .topbar a{
            text-decoration:none;
            color:var(--text);
            border:1px solid var(--border);
            background:#fff;
            padding:8px 10px;
            border-radius:10px;
            font-size:13px;
        }

        .panel{
            border:1px solid var(--border);
            background:var(--panel);
            border-radius:14px;
            padding:14px;
            margin-bottom:12px;
        }

        .panel-head{
            display:flex;
            justify-content:space-between;
            align-items:flex-end;
            gap:12px;
            margin-bottom:10px;
        }
        .panel-head .title{
            font-size:14px;
            font-weight:700;
            margin:0;
        }
        .panel-head .sub{
            font-size:12px;
            color:var(--muted);
            margin:0;
        }

        .group{
            border-top:1px dashed var(--border);
            padding-top:12px;
            margin-top:12px;
        }
        .group:first-of-type{
            border-top:none;
            padding-top:0;
            margin-top:0;
        }
        .group h3{
            margin:0 0 10px 0;
            font-size:13px;
            color:#374151;
            letter-spacing:-0.1px;
        }

        /* ✅ 반응형 그리드 */
        .grid{
            display:grid;
            gap:10px;
        }
        .grid.two{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .grid.four{ grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .grid.five{ grid-template-columns: repeat(5, minmax(0, 1fr)); }

        @media (max-width: 1024px){
            .grid.five{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .grid.four{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 640px){
            .grid.two,
            .grid.four,
            .grid.five{ grid-template-columns: 1fr; }
        }

        .field label{
            display:block;
            font-size:12px;
            color:#4b5563;
            margin-bottom:6px;
        }
        input, select{
            width:100%;
            padding:10px 10px;
            border-radius:10px;
            border:1px solid var(--border);
            background:#fff;
            font-size:13px;
            outline:none;
        }
        input:focus, select:focus{
            border-color:#c7cdd6;
            box-shadow: 0 0 0 3px rgba(17,24,39,0.06);
        }

        /* ✅ 최소~최대 한 줄 */
        .range{
            display:grid;
            grid-template-columns: 1fr 22px 1fr;
            align-items:center;
            gap:8px;
        }
        .range .sep{
            text-align:center;
            color:var(--muted);
            font-size:12px;
        }

        .actions{
            display:flex;
            justify-content:flex-end;
            gap:8px;
            margin-top:12px;
        }
        button{
            border:none;
            border-radius:10px;
            padding:10px 12px;
            font-size:13px;
            cursor:pointer;
        }
        .btn-primary{
            background:var(--btn);
            color:var(--btnText);
        }
        .btn-ghost{
            background:var(--btnGhost);
            border:1px solid var(--border);
            color:var(--text);
        }

        .hint{
            margin-top:10px;
            font-size:13px;
            color:var(--muted);
        }

        #map{
            width:100%;
            height:640px;
            border:1px solid var(--border);
            border-radius:14px;
            overflow:hidden;
            background:#fff;
        }



             /* ✅ InfoWindow 닫기 버튼: 텍스트 대신 선 2개로 X 만들기 */
         .iw-close{
             position:absolute;
             right:8px; top:8px;
             width:26px; height:26px;
             border-radius:8px;
             border:1px solid #e5e7eb;
             background:#fff;
             cursor:pointer;
             padding:0;
         }
        .iw-close:hover{ background:#f3f4f6; }
        .iw-close:active{ transform: scale(0.98); }
        .iw-close:focus{ outline:none; box-shadow: 0 0 0 3px rgba(17,24,39,0.08); }

        .iw-close::before,
        .iw-close::after{
            content:"";
            position:absolute;
            left:50%; top:50%;
            width:12px; height:2px;
            background:#6b7280;
            border-radius:2px;
            transform-origin:center;
        }
        .iw-close::before{ transform: translate(-50%,-50%) rotate(45deg); }
        .iw-close::after { transform: translate(-50%,-50%) rotate(-45deg); }
    </style>
    </style>
</head>
<body>
<div class="wrap">

    <div class="topbar">
        <h1>매물 지도</h1>
        <a href="/properties">📄 매물 목록</a>
    </div>

    <div class="panel">
        <div class="panel-head">
            <div>
                <p class="title">필터</p>
                <p class="sub">필터를 설정하고 [적용]을 누르면 매물이 표시됩니다.</p>
            </div>
            <div class="sub">단위: 금액은 “만원”</div>
        </div>

        <div class="group">

            <h3>기본 조건</h3>
            <div class="field" style="margin-bottom:12px;">
                <label>🔍 키워드</label>
                <input id="keyword" type="text" placeholder="제목, 주소, 건물명 검색" />
            </div>
            <div class="grid two">
                <div class="field">
                    <label>구역</label>
                    <input id="region" type="text" placeholder="예: 해운대" />
                </div>

                <div class="field">
                    <label>거래유형</label>
                    <select id="dealType">
                        <option value="">전체</option>
                        <option value="MONTHLY">월세</option>
                        <option value="JEONSE">전세</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="group">
            <h3>가격/스펙</h3>
            <div class="grid four">
                <div class="field">
                    <label>보증금(만)</label>
                    <div class="range">
                        <input id="minDeposit" type="number" placeholder="최소" />
                        <div class="sep">~</div>
                        <input id="maxDeposit" type="number" placeholder="최대" />
                    </div>
                </div>

                <div class="field">
                    <label>월세(만)</label>
                    <div class="range">
                        <input id="minMonthlyRent" type="number" placeholder="최소" />
                        <div class="sep">~</div>
                        <input id="maxMonthlyRent" type="number" placeholder="최대" />
                    </div>
                </div>

                <div class="field">
                    <label>준공연도</label>
                    <div class="range">
                        <input id="minBuiltYear" type="number" placeholder="최소" />
                        <div class="sep">~</div>
                        <input id="maxBuiltYear" type="number" placeholder="최대" />
                    </div>
                </div>

                <div class="field">
                    <label>평수</label>
                    <div class="range">
                        <input id="minArea" type="number" step="0.1" placeholder="최소" />
                        <div class="sep">~</div>
                        <input id="maxArea" type="number" step="0.1" placeholder="최대" />
                    </div>
                </div>
            </div>
        </div>

        <div class="group">
            <h3>옵션</h3>
            <div class="grid five">
                <div class="field">
                    <label>룸 개수</label>
                    <select id="roomCount">
                        <option value="">전체</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <div class="field">
                    <label>엘리베이터</label>
                    <select id="hasElevator">
                        <option value="">전체</option>
                        <option value="true">있음</option>
                        <option value="false">없음</option>
                    </select>
                </div>

                <div class="field">
                    <label>주차</label>
                    <select id="hasParking">
                        <option value="">전체</option>
                        <option value="true">가능</option>
                        <option value="false">불가</option>
                    </select>
                </div>

                <div class="field">
                    <label>반려동물</label>
                    <select id="petAllowed">
                        <option value="">전체</option>
                        <option value="true">가능</option>
                        <option value="false">불가</option>
                    </select>
                </div>

                <div class="field">
                    <label>LH</label>
                    <select id="lhAvailable">
                        <option value="">전체</option>
                        <option value="true">LH</option>
                        <option value="false">일반</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="actions">
            <button id="btnReset" class="btn-ghost" type="button">초기화</button>
            <button id="btnSearch" class="btn-primary" type="button">적용</button>
        </div>

        <div class="hint" id="hint"></div>
    </div>

    <div id="map"></div>

</div>

<script type="text/javascript"
        src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=m09cd547kq"></script>

<script th:inline="javascript">
    const focusId = /*[[${focusId}]]*/ null;
</script>

<script>
    const map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(37.5665, 126.9780),
        zoom: 12
    });

    let markers = [];
    let infoWindows = [];
    const markerMap = new Map();

    function setHint(text) {
        const el = document.getElementById('hint');
        if (el) el.textContent = text || '';
    }

    function clearMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        infoWindows.forEach(iw => iw.close());
        infoWindows = [];
        markerMap.clear();
    }

    // ✅ 인포윈도우 전부 닫기
    function closeAllInfo() {
        infoWindows.forEach(iw => iw.close());
    }

    // ✅ 지도 빈 곳 클릭하면 상태창 닫기
    naver.maps.Event.addListener(map, 'click', () => {
        closeAllInfo();
    });

    // ✅ ESC 키로 닫기
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeAllInfo();
    });

    function readValue(id) {
        const el = document.getElementById(id);
        return el ? el.value.trim() : '';
    }

    function addParam(params, key, raw) {
        if (raw === null || raw === undefined) return;
        const v = String(raw).trim();
        if (v === '') return;
        params.append(key, v);
    }

    function buildQuery() {
        const params = new URLSearchParams();

        addParam(params, 'keyword', readValue('keyword'));
        addParam(params, 'region', readValue('region'));
        addParam(params, 'dealType', readValue('dealType'));
        addParam(params, 'minDeposit', readValue('minDeposit'));
        addParam(params, 'maxDeposit', readValue('maxDeposit'));
        addParam(params, 'minMonthlyRent', readValue('minMonthlyRent'));
        addParam(params, 'maxMonthlyRent', readValue('maxMonthlyRent'));
        addParam(params, 'minBuiltYear', readValue('minBuiltYear'));
        addParam(params, 'maxBuiltYear', readValue('maxBuiltYear'));
        addParam(params, 'roomCount', readValue('roomCount'));
        addParam(params, 'hasElevator', readValue('hasElevator'));
        addParam(params, 'hasParking', readValue('hasParking'));
        addParam(params, 'petAllowed', readValue('petAllowed'));
        addParam(params, 'lhAvailable', readValue('lhAvailable'));
        addParam(params, 'minArea', readValue('minArea'));
        addParam(params, 'maxArea', readValue('maxArea'));

        return params.toString();
    }

    function hasAnyFilter() {
        const ids = [
            'keyword',
            'region','dealType',
            'minDeposit','maxDeposit','minMonthlyRent','maxMonthlyRent',
            'minBuiltYear','maxBuiltYear',
            'roomCount','hasElevator','hasParking','petAllowed','lhAvailable',
            'minArea','maxArea'
        ];
        return ids.some(id => readValue(id) !== '');
    }

    // ✅ 인포윈도우 내용: X 버튼 포함 (닫기 버튼은 class="iw-close")
    function buildInfoHtml(p) {
        const dealLine =
            (p.dealType === 'MONTHLY')
                ? ` · 보/월 ${p.depositMan ?? '-'} / ${p.monthlyRentMan ?? '-'}만`
                : (p.dealType === 'JEONSE')
                    ? ` · 전세 ${p.depositMan ?? '-'}만`
                    : '';

        return `
  <div style="position:relative; padding:10px 34px 10px 10px; min-width:240px;">
    <button type="button" class="iw-close" aria-label="닫기"></button>

    <div style="font-weight:700; margin-bottom:6px;">${p.title ?? ''}</div>
    <div style="margin:6px 0; color:#666; font-size:12px;">
      ${p.address ?? ''}
    </div>
    <div style="margin:6px 0; font-size:12px; color:#444;">
      ${(p.dealTypeLabel ?? p.dealType ?? '')} · ${(p.statusLabel ?? p.status ?? '')}
      ${dealLine}
    </div>
    <a href="/properties/${p.id}">상세보기</a>
  </div>
`;
    }

    async function loadMarkers() {

        // ===============================
        // A) 상세 -> 지도에서 보기 (focusId)
        // ===============================
        if (focusId != null) {
            clearMarkers();
            setHint('선택한 매물을 불러오는 중...');

            try {
                const url = `/api/properties?id=${encodeURIComponent(focusId)}`;
                const res = await fetch(url);
                const list = await res.json();

                clearMarkers();
                setHint(`표시된 매물: ${Array.isArray(list) ? list.length : 0}건`);

                if (!Array.isArray(list) || list.length === 0) return;

                const p0 = list[0];
                if (p0.lat != null && p0.lng != null) {
                    map.setCenter(new naver.maps.LatLng(p0.lat, p0.lng));
                    map.setZoom(16);
                }

                list.forEach(p => {
                    if (p.lat == null || p.lng == null) return;

                    const pid = Number(p.id);
                    const latlng = new naver.maps.LatLng(p.lat, p.lng);
                    const marker = new naver.maps.Marker({ position: latlng, map });

                    const info = new naver.maps.InfoWindow({
                        content: buildInfoHtml(p)
                    });

                    // ✅ 마커 클릭: 토글 + 다른 창 닫기
                    naver.maps.Event.addListener(marker, 'click', () => {
                        if (info.getMap()) { info.close(); return; }
                        closeAllInfo();
                        info.open(map, marker);

                        // ✅ InfoWindow DOM이 만들어진 뒤 닫기 버튼 이벤트 연결
                        setTimeout(() => {
                            const root = info.getElement();
                            if (!root) return;
                            const btn = root.querySelector('.iw-close');
                            if (btn) btn.onclick = () => info.close();
                        }, 0);
                    });

                    markers.push(marker);
                    infoWindows.push(info);
                    markerMap.set(pid, { marker, info, latlng });
                });

                // 자동 오픈
                const target = markerMap.get(Number(p0.id));
                if (target) {
                    closeAllInfo();
                    target.info.open(map, target.marker);
                    setTimeout(() => {
                        const root = target.info.getElement();
                        const btn = root?.querySelector('.iw-close');
                        if (btn) btn.onclick = () => target.info.close();
                    }, 0);
                }

            } catch (e) {
                console.error(e);
                setHint('선택한 매물 로딩 실패');
            }
            return;
        }

        // ===============================
        // B) 필터 검색
        // ===============================
        if (!hasAnyFilter()) {
            clearMarkers();
            setHint('필터를 설정하고 [적용]을 누르면 매물이 표시됩니다.');
            return;
        }

        const qs = buildQuery();
        const url = `/api/properties?${qs}`;

        try {
            const res = await fetch(url);
            const list = await res.json();

            clearMarkers();
            setHint(`표시된 매물: ${Array.isArray(list) ? list.length : 0}건`);

            if (!Array.isArray(list) || list.length === 0) return;

            list.forEach(p => {
                if (p.lat == null || p.lng == null) return;

                const pid = Number(p.id);
                const latlng = new naver.maps.LatLng(p.lat, p.lng);
                const marker = new naver.maps.Marker({ position: latlng, map });

                const info = new naver.maps.InfoWindow({
                    content: buildInfoHtml(p)
                });

                // ✅ 마커 클릭: 토글 + 다른 창 닫기
                naver.maps.Event.addListener(marker, 'click', () => {
                    if (info.getMap()) { info.close(); return; }
                    closeAllInfo();
                    info.open(map, marker);

                    setTimeout(() => {
                        const root = info.getElement();
                        if (!root) return;
                        const btn = root.querySelector('.iw-close');
                        if (btn) btn.onclick = () => info.close();
                    }, 0);
                });

                markers.push(marker);
                infoWindows.push(info);
                markerMap.set(pid, { marker, info, latlng });
            });

            // 결과 첫번째로 이동(선택)
            const p0 = list[0];
            if (p0.lat != null && p0.lng != null) {
                map.setCenter(new naver.maps.LatLng(p0.lat, p0.lng));
            }

        } catch (err) {
            console.error(err);
            setHint('마커 로딩 실패');
        }
    }

    function resetFilters() {
        const ids = [
            'keyword','region','dealType',
            'minDeposit','maxDeposit','minMonthlyRent','maxMonthlyRent',
            'minBuiltYear','maxBuiltYear',
            'roomCount','hasElevator','hasParking','petAllowed','lhAvailable',
            'minArea','maxArea'
        ];
        ids.forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.value = '';
        });
    }

    document.getElementById('btnSearch').addEventListener('click', loadMarkers);
    document.getElementById('btnReset').addEventListener('click', () => {
        resetFilters();
        clearMarkers();
        setHint('필터를 설정하고 [적용]을 누르면 매물이 표시됩니다.');
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT')) {
                e.preventDefault();
                loadMarkers();
            }
        }
    });

    // 최초 로딩: focusId면 1건 표시, 아니면 0개
    if (focusId != null) {
        loadMarkers();
    } else {
        clearMarkers();
        setHint('필터를 설정하고 [적용]을 누르면 매물이 표시됩니다.');
    }
</script>
</body>
</html>
